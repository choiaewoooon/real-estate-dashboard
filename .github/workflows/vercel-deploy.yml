name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}
        
    - name: Install Backend Dependencies
      run: pip install -r requirements.txt
      
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./
        vercel-args: '--prod'
        
    - name: Create Deployment Summary
      run: |
        echo "## 🚀 Vercel Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**프로젝트:** Real Estate Dashboard" >> $GITHUB_STEP_SUMMARY
        echo "**배포 환경:** Production" >> $GITHUB_STEP_SUMMARY
        echo "**트리거:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 다음 단계" >> $GITHUB_STEP_SUMMARY
        echo "1. Vercel 대시보드에서 배포 상태 확인" >> $GITHUB_STEP_SUMMARY
        echo "2. 환경 변수 설정 확인" >> $GITHUB_STEP_SUMMARY
        echo "3. 도메인 설정 (필요시)" >> $GITHUB_STEP_SUMMARY